    <!-- GLOBAL TRACKING HELPER (META + TIKTOK) -->
    <script>
      // Deduplication storage
      window._lastTracked = {};

      window.trackEvent = function(name, params = {}) {
        const now = Date.now();
        const eventKey = `${name}_${JSON.stringify(params)}`;
        
        // Prevent duplicate events within 1.5 seconds
        if (window._lastTracked[eventKey] && (now - window._lastTracked[eventKey] < 1500)) {
          return;
        }
        window._lastTracked[eventKey] = now;

        // Common Parameters
        const contentName = params.content_name || '';
        const contentId = params.content_id || contentName.toLowerCase().replace(/\s+/g, '_');
        const value = params.value || 0;
        const currency = params.currency || 'IDR';

        // 1. Meta Pixel (FB)
        if (typeof fbq !== 'undefined') {
          let metaParams = { ...params };
          
          // Fix warnings: Add content_ids and content_type for catalog ads
          if (contentName || contentId) {
            metaParams.content_ids = [contentId];
            metaParams.content_type = 'product';
          }
          
          fbq('track', name, metaParams);
          console.log(`[Meta Pixel] Tracked: ${name}`, metaParams);
        }

        // 2. TikTok Pixel
        if (typeof ttq !== 'undefined') {
          if (name === 'PageView') {
            ttq.page();
            console.log(`[TikTok Pixel] Tracked: PageView`);
            return; 
          }

          let tiktokEvent = name;
          if (name === 'Lead') tiktokEvent = 'CompleteRegistration';

          let tiktokParams = { ...params };
          if (contentName || contentId) {
            tiktokParams.contents = [{
              content_id: contentId,
              content_name: contentName,
              content_type: 'product',
              quantity: 1,
              price: value
            }];
            tiktokParams.content_type = 'product';
          }

          ttq.track(tiktokEvent, tiktokParams);
          console.log(`[TikTok Pixel] Tracked: ${tiktokEvent}`, tiktokParams);
        }
      };

      window.trackCustomEvent = function(name, params = {}) {
        if (typeof fbq !== 'undefined') fbq('trackCustom', name, params);
        if (typeof ttq !== 'undefined') ttq.track(name, params);
        console.log(`[Multi-Pixel] Tracked Custom: ${name}`, params);
      };
    </script>
